version: 0.2

phases:
  install:
    commands:
      - corepack enable
      - corepack prepare pnpm@11.9.0 --activate
      - pnpm install --frozen-lockfile --filter web...
  build:
    commands:
      - cd apps/web && pnpm run generate
  post_build:
    commands:
      # CodeBuild carries the shell's cwd over between phases -- the build phase's
      # `cd apps/web` leaves us already inside apps/web, so a relative `cd apps/web`
      # here would look for apps/web/apps/web. Anchor to the source root instead.
      - cd "$CODEBUILD_SRC_DIR/apps/web" && node scripts/update-csp-policy.mjs
      - aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
artifacts:
  files:
    - '**/*'
  base-directory: apps/web/.output/public
